name: CI/CD Pipeline
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install Dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Run test
        run: |
          cd app
          pytest test_app.py -v

  build-and-push:
    needs: test
    name: Build and push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devops-demo-app
          tags: |
            type=sha, prefix=, format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Image bunna44/devops-demo:${{ needs.build-and-push.outputs.image_tag }} ready"
          echo "In a real cluster: kubectl set image deployment/flask-deployment flask=bunna44/devops-demo:${{ needs.build-and-push.outputs.image_tag }}"
