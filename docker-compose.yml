version: '3.8'

services:
  flask:
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - .env

    expose:
      - "5000"
    restart: unless-stopped
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    depends_on:
      - flask
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

