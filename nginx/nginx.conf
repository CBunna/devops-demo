events {
    worker_connections 1024;
}

http {
    upstream flask_app {
        server flask:5000;
    }

    server {
        listen 80;

        location /metrics {
            deny all;
            return 403;
        }

        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            proxy_pass http://flask_app;
            access_log off;
        }
    }
}